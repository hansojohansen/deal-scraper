scraper:
  finn:
    base_url: "https://www.finn.no/mobility/browse/car"
    api_url: "https://www.finn.no/api/search-qf"
    delay_seconds: 1.2
    user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
    # Update these selectors when finn.no changes their HTML (no code change needed)
    selectors:
      result_list: "article.sf-search-ad"
      link: "a.sf-search-ad-link"

outlier:
  min_peer_group_size: 5        # minimum peers for z-score fallback
  z_score_threshold: -1.5       # flag if z-score below this
  z_score_remove_threshold: -0.5  # remove flag if score rises above this
  iqr_multiplier: 1.5
  year_range: 2                 # ±2 years for z-score peer group
  mileage_range: 30000          # ±30k km for z-score peer group
  ols_min_peers: 8              # minimum peers for OLS regression (primary method)
  ols_deal_threshold: -0.15     # flag if OLS residual below -15% of fair value
  log_model: true               # use log-linear price model (captures exponential depreciation)
  training_filter_low_pct: 0.20 # exclude peers priced below 20% of median (scam filter)
  training_filter_high_pct: 5.0 # exclude peers priced above 500% of median (outlier filter)
  min_price_nok: 30000          # skip quality-tier cars below this price (salvage/parts)

ai:
  batch_size: 5
  daily_quota: 500             # Gemini Flash free tier RPD
  models:
    - gemini-2.0-flash-lite
    - gemini-2.0-flash
    - gemini-2.5-flash
    - gemini-flash-lite-latest

notifications:
  alert_cooldown_hours: 24     # don't re-notify on same car within this window