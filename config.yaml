scraper:
  finn:
    base_url: "https://www.finn.no/mobility/browse/car"
    api_url: "https://www.finn.no/api/search-qf"
    delay_seconds: 1.2
    user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
    # Update these selectors when finn.no changes their HTML (no code change needed)
    selectors:
      result_list: "article.sf-search-ad"
      link: "a.sf-search-ad-link"

outlier:
  tight_year_window: 1          # ±1 year for primary peer group
  tight_mileage_window: 25000   # ±25k km for primary peer group
  loose_year_window: 3          # ±3 years fallback if tight has <3 peers
  loose_mileage_window: 50000   # ±50k km fallback
  min_peers: 3                  # minimum peers required for any detection
  deal_threshold: -0.20         # flag if price >20% below peer median
  stale_threshold: -0.05        # remove flag if price within 5% of peer median
  min_price_nok: 30000          # skip salvage/parts cars below this price

ai:
  batch_size: 5
  daily_quota: 500             # Gemini Flash free tier RPD
  models:
    - gemini-2.0-flash-lite
    - gemini-2.0-flash
    - gemini-2.5-flash
    - gemini-flash-lite-latest

notifications:
  alert_cooldown_hours: 24     # don't re-notify on same car within this window